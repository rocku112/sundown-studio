  <!-- 鎖頭角標（右下） -->
  <rect x="38" y="42" width="18" height="14" rx="3" fill="#E8B84B"/>
  <path d="M42 42 Q42 36 47 36 Q52 36 52 42" fill="none" stroke="#E8B84B" stroke-width="2.5" stroke-linecap="round"/>
