<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 方案 F：奶白底圓形 + 深藍邊框 + 雙色嫩芽 -->
  <circle cx="32" cy="32" r="32" fill="#F5F0E8"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#1E3554" stroke-width="2.5"/>
  <!-- 莖 -->
  <line x1="32" y1="50" x2="32" y2="22" stroke="#1E3554" stroke-width="2.2" stroke-linecap="round"/>
  <!-- 左葉（深藍） -->
  <path d="M32 22 C28 14 17 16 19 25 C21 34 32 31 32 31Z" fill="#1E3554"/>
  <!-- 右葉（金色） -->
  <path d="M32 30 C36 22 47 24 45 33 C43 40 32 37 32 37Z" fill="#E8B84B"/>
  <!-- 根部小橫線（地面感） -->
  <line x1="24" y1="50" x2="40" y2="50" stroke="#1E3554" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
</svg>
