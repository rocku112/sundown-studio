<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永續知幾 · 管理後台</title>
<link rel="icon" type="image/svg+xml" href="favicon_admin.svg">
<style>
:root{
  --green:#7A9A5A;--gl:#93B574;--gp:#EEF4E8;--gll:#A8C48A;--gd:#4a6b3a;
  --orange:#c87848;--op:#fdf0e0;
  --red:#b71c1c;--rp:#ffebee;
  --blue:#2563a8;--bp:#e8f2f9;
  --purple:#6d5fa6;--pp:#eeebf9;
  --gray:#7a6e65;--lgray:#f0ece4;--border:#e5ddd2;--border2:#ede8e0;
  --bg:#faf8f4;--card:#ffffff;--sidebar-bg:#f5f2ec;
  --shadow:0 2px 10px rgba(0,0,0,.07);--shadow-md:0 4px 20px rgba(0,0,0,.1);--shadow-lg:0 8px 40px rgba(0,0,0,.14);
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
  --font:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
  --tr:.2s ease;
  --drawer-w:500px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:#263238;min-height:100vh;overflow-x:hidden}

/* ── 主分頁 tab 切換 ── */
.main-tabs{display:flex;gap:2px;padding:0 28px;background:var(--card);border-bottom:1px solid var(--border2);margin-bottom:0;}
.main-tab{padding:12px 20px;border:none;background:none;font-family:var(--font);font-size:.85rem;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;transition:all var(--tr);}
.main-tab:hover{color:var(--green);background:var(--gp);}
.main-tab.active{color:var(--green);border-bottom-color:var(--gl);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── Analytics 分頁樣式 ── */
#analytics-wrap{padding:24px 28px;max-width:1280px;width:100%;margin:0 auto;}
.an-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.an-section-title{font-size:.78rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.an-section-title::before{content:'';width:3px;height:14px;background:var(--gl);border-radius:2px;display:inline-block;}
.an-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;margin-bottom:20px;box-shadow:var(--shadow);}

/* 頁面熱度圖 */
.pg-heat-grid{display:flex;flex-direction:column;gap:6px;}
.pg-heat-item{display:flex;align-items:center;gap:10px;padding:0;}
.pg-heat-rank{width:20px;font-size:.72rem;font-weight:700;color:var(--gray);text-align:right;flex-shrink:0;}
.pg-heat-name{width:80px;font-size:.8rem;color:#444;font-weight:600;flex-shrink:0;text-align:right;}
.pg-heat-bar{flex:1;height:24px;border-radius:6px;background:var(--lgray);overflow:hidden;position:relative;}
.pg-heat-fill{height:100%;border-radius:6px;transition:width .6s ease;min-width:2px;}
.pg-heat-count{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.75rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2);}
.pg-heat-count.outside{position:static;transform:none;color:#888;text-shadow:none;margin-left:6px;flex-shrink:0;font-size:.78rem;}

/* 事件時間軸 */
.ev-list{display:flex;flex-direction:column;gap:6px;max-height:480px;overflow-y:auto;}
.ev-item{display:grid;grid-template-columns:140px 100px 1fr auto;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:.8rem;}
.ev-time{color:var(--gray);font-size:.75rem;}
.ev-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;white-space:nowrap;}
.ev-page_view{background:var(--gp);color:var(--green);}
.ev-exam_start{background:var(--bp);color:var(--blue);}
.ev-exam_submit{background:var(--op);color:var(--orange);}
.ev-login{background:#EEF4E8;color:#4a6b3a;}
.ev-logout{background:var(--lgray);color:var(--gray);}
.ev-feature_click{background:var(--pp);color:var(--purple);}
.ev-uid{font-size:.7rem;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.ev-detail{font-size:.75rem;color:#455a64;}

/* 事件篩選 */
.an-filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.an-chip{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--gray);transition:all var(--tr);}
.an-chip.active{background:var(--green);color:#fff;border-color:var(--green);}
.an-loading{display:flex;align-items:center;gap:10px;color:var(--gray);font-size:.85rem;padding:32px;justify-content:center;}

/* 時間篩選列 */
.date-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.date-filter-bar .df-label{font-size:.78rem;color:var(--gray);font-weight:600;margin-right:2px;}
.df-btn{padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--gray);transition:all var(--tr);font-family:var(--font);}
.df-btn:hover{border-color:var(--gl);color:var(--green);}
.df-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.df-custom{display:flex;align-items:center;gap:6px;margin-left:4px;}
.df-custom input[type="date"]{font-family:var(--font);font-size:.75rem;padding:4px 8px;border:1.5px solid var(--border);border-radius:var(--radius-xs);color:#263238;outline:none;}
.df-custom input[type="date"]:focus{border-color:var(--gl);}

/* Dashboard 總覽 */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.dash-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);transition:transform var(--tr),box-shadow var(--tr);}
.dash-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.dash-card-title{font-size:.72rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.dash-card-title svg{width:14px;height:14px;color:var(--gl);}
.dash-val{font-size:2rem;font-weight:800;line-height:1;}
.dash-sub{font-size:.75rem;color:var(--gray);margin-top:6px;}
.dash-section{margin-bottom:24px;}
.dash-section-title{font-size:.78rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.dash-section-title::before{content:'';width:3px;height:14px;background:var(--gl);border-radius:2px;display:inline-block;}
.dash-recent{display:flex;flex-direction:column;gap:8px;}
.dash-recent-item{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.dash-recent-item .ev-badge{flex-shrink:0;}
.dash-recent-detail{flex:1;font-size:.82rem;color:#455a64;}
.dash-recent-time{font-size:.72rem;color:var(--gray);flex-shrink:0;}

/* CSV export button */
.btn-export{display:flex;align-items:center;gap:5px;padding:6px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--gray);font-family:var(--font);font-size:.78rem;font-weight:600;cursor:pointer;transition:all var(--tr);}
.btn-export:hover{border-color:var(--gl);color:var(--green);background:var(--gp);}
.btn-export svg{width:14px;height:14px;}

@media(max-width:960px){.an-stats-row{grid-template-columns:repeat(2,1fr)}.pg-heat-name{width:70px;font-size:.75rem;}.dash-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.ev-item{grid-template-columns:1fr auto;}.ev-time,.ev-uid{display:none;}.an-stats-row{grid-template-columns:1fr 1fr}.pg-heat-name{width:60px;font-size:.7rem;}.dash-grid{grid-template-columns:1fr 1fr;}}

/* ══════════════════ 訪客管理 ══════════════════ */
#pane-visitors main{padding:24px 28px;max-width:1280px;width:100%;margin:0 auto;}
.visitor-card{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);
  padding:16px 20px;cursor:pointer;
  display:grid;grid-template-columns:44px 1fr auto auto auto;align-items:center;gap:16px;
  transition:all var(--tr);box-shadow:var(--shadow);margin-bottom:8px;
}
.visitor-card:hover{border-color:var(--gll);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.visitor-card.active{border-color:var(--gl);background:linear-gradient(to right,#f6fbf8,#fff);}
.vc-avatar{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#4a7ab5,#7aa8d4);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.85rem;font-weight:800;flex-shrink:0;letter-spacing:-.5px;
}
.vc-info .vc-name{font-size:.9rem;font-weight:700;color:#1a2e1a;margin-bottom:3px;}
.vc-info .vc-pages{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.vc-page-pill{font-size:.65rem;font-weight:600;padding:1px 7px;border-radius:10px;background:var(--gp);color:var(--green);}
.vc-stat{text-align:center;flex-shrink:0;min-width:60px;}
.vc-stat-val{font-size:.95rem;font-weight:800;}
.vc-stat-lbl{font-size:.68rem;color:var(--gray);margin-top:1px;}
.vc-last{font-size:.72rem;color:var(--gray);text-align:right;flex-shrink:0;min-width:90px;}

/* 訪客 drawer 事件列表 */
.vd-ev-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.vd-ev-item:last-child{border-bottom:none;}
.vd-ev-time{font-size:.72rem;color:var(--gray);flex-shrink:0;width:130px;}
.vd-ev-detail{font-size:.78rem;color:#455a64;flex:1;}

@media(max-width:600px){
  .visitor-card{grid-template-columns:44px 1fr;}
  .vc-stat,.vc-last{display:none;}
}

/* ══════════════════ 訪客 DRAWER ══════════════════ */
#vd-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;backdrop-filter:blur(2px);}
#vd-overlay.show{display:block;animation:fadeIn .2s ease;}
#vd-drawer{
  position:fixed;top:0;right:0;bottom:0;width:var(--drawer-w);max-width:100vw;
  background:var(--bg);z-index:301;
  box-shadow:-8px 0 40px rgba(0,0,0,.15);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#vd-drawer.open{transform:none;}
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:radial-gradient(ellipse at 60% 40%, #d4eedd 0%, #faf8f4 60%);
}
.login-card{
  background:var(--card);border-radius:20px;
  box-shadow:var(--shadow-lg);
  padding:52px 56px;text-align:center;max-width:430px;width:calc(100% - 32px);
  border:1px solid var(--border);
  animation:fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-emblem{
  width:72px;height:72px;border-radius:18px;
  background:linear-gradient(145deg,#2d5a1b,#4a8a2a);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto 24px;
  box-shadow:0 6px 20px rgba(27,92,66,.3);
}
.login-card h1{font-size:1.4rem;font-weight:800;color:#1a2e1f;margin-bottom:8px}
.login-card .sub{color:var(--gray);font-size:.88rem;margin-bottom:36px;line-height:1.6}
#btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px 16px;
  background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  color:#263238;font-family:var(--font);font-size:.93rem;font-weight:600;
  cursor:pointer;transition:all var(--tr);box-shadow:0 1px 4px rgba(0,0,0,.07);
}
#btn-google:hover{border-color:var(--gl);background:var(--gp);color:var(--green);box-shadow:var(--shadow)}
#btn-google svg{width:18px;height:18px;flex-shrink:0}
#login-error{color:var(--red);font-size:.82rem;display:none;margin-top:14px;background:var(--rp);border-radius:8px;padding:9px 14px}

/* ══════════════════ LAYOUT ══════════════════ */
#dashboard{display:none;min-height:100vh;flex-direction:column}

/* header */
header{
  background:var(--card);border-bottom:1px solid var(--border2);
  padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.h-left{display:flex;align-items:center;gap:12px}
.h-badge{
  background:linear-gradient(135deg,#2d5a1b,#4a8a2a);
  color:#d4f0a0;font-size:.68rem;font-weight:800;letter-spacing:.1em;
  padding:3px 11px;border-radius:20px;
}
header h1{font-size:.97rem;font-weight:700;color:var(--green)}
header h1 span{color:var(--gray);font-weight:400}
.h-right{display:flex;align-items:center;gap:10px}
#admin-email{font-size:.78rem;color:var(--gray);background:var(--lgray);padding:4px 10px;border-radius:20px}
.h-btn{background:none;border:1.5px solid var(--border);border-radius:var(--radius-xs);color:var(--gray);padding:5px 14px;font-family:var(--font);font-size:.78rem;cursor:pointer;transition:all var(--tr)}
#btn-logout:hover{border-color:var(--red);color:var(--red);background:var(--rp)}
#btn-refresh:hover{border-color:var(--gl);color:var(--green);background:var(--gp)}
#btn-refresh{display:flex;align-items:center;gap:5px}
#btn-refresh svg{width:12px;height:12px;transition:transform .4s}
#btn-refresh:hover svg{transform:rotate(180deg)}

main{padding:24px 28px;max-width:1280px;width:100%;margin:0 auto;animation:fadeUp .4s ease both}

/* ══════════════════ STATS ══════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{
  background:var(--card);border-radius:var(--radius);padding:20px 22px;
  border:1px solid var(--border);box-shadow:var(--shadow);
  display:flex;align-items:center;gap:16px;
  transition:transform var(--tr),box-shadow var(--tr);
}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.sc-icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;
}
.sc.c0 .sc-icon{background:var(--gp)} .sc.c1 .sc-icon{background:var(--bp)}
.sc.c2 .sc-icon{background:var(--op)} .sc.c3 .sc-icon{background:var(--rp)}
.sc-body{}
.sc-val{font-size:1.75rem;font-weight:800;line-height:1}
.sc.c0 .sc-val{color:var(--green)} .sc.c1 .sc-val{color:var(--blue)}
.sc.c2 .sc-val{color:var(--orange)} .sc.c3 .sc-val{color:var(--red)}
.sc-lbl{font-size:.75rem;color:var(--gray);margin-top:4px}

/* ══════════════════ TOOLBAR ══════════════════ */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:10px}
.sec-title{font-size:.82rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em}
.count-pill{background:var(--gp);color:var(--green);border:1px solid var(--gll);border-radius:20px;font-size:.72rem;font-weight:700;padding:2px 10px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--gray);pointer-events:none}
#search-input{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:7px 12px 7px 32px;font-family:var(--font);font-size:.82rem;color:#263238;
  outline:none;width:200px;transition:border-color var(--tr);
}
#search-input:focus{border-color:var(--gl)}
#search-input::placeholder{color:#b0a898}

/* ══════════════════ USER CARDS ══════════════════ */
.users-grid{display:flex;flex-direction:column;gap:8px}

.user-card{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);
  padding:16px 20px;cursor:pointer;
  display:grid;grid-template-columns:44px 1fr auto auto auto auto;align-items:center;gap:16px;
  transition:all var(--tr);box-shadow:var(--shadow);
}
.user-card:hover{border-color:var(--gll);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.user-card.active{border-color:var(--gl);background:linear-gradient(to right,#f6fbf8,#fff);box-shadow:0 4px 20px rgba(63,160,104,.15)}

/* avatar */
.uc-avatar{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#2d5a1b,#5a9e6a);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1rem;font-weight:800;flex-shrink:0;
}
/* name + email */
.uc-info .uc-name{font-size:.9rem;font-weight:700;color:#1a2e1f;margin-bottom:2px}
.uc-info .uc-email{font-size:.75rem;color:var(--gray)}

/* ring */
.uc-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.uc-ring-label{font-size:.65rem;color:var(--gray);text-align:center}

/* mini stats */
.uc-stat{text-align:center;flex-shrink:0;min-width:60px}
.uc-stat-val{font-size:.95rem;font-weight:800}
.uc-stat-lbl{font-size:.68rem;color:var(--gray);margin-top:1px}

/* badge */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;white-space:nowrap}
.badge-green{background:var(--gp);color:var(--green);border:1px solid var(--gll)}
.badge-gray{background:var(--lgray);color:var(--gray);border:1px solid var(--border)}
.badge-orange{background:var(--op);color:var(--orange);border:1px solid #dea97a}
.badge-red{background:var(--rp);color:var(--red);border:1px solid #e57373}

/* ring SVG */
.ring-svg{overflow:visible}
.ring-bg{fill:none;stroke:#e5ddd2;stroke-width:4}
.ring-fill{fill:none;stroke-width:4;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .6s ease}
.ring-text{font-family:var(--font);font-weight:800;font-size:9px;fill:#263238;dominant-baseline:middle;text-anchor:middle}

/* ══════════════════ DRAWER ══════════════════ */
#drawer-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;
  backdrop-filter:blur(2px);
}
#drawer-overlay.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#drawer{
  position:fixed;top:0;right:0;bottom:0;width:var(--drawer-w);max-width:100vw;
  background:var(--bg);z-index:301;
  box-shadow:-8px 0 40px rgba(0,0,0,.15);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#drawer.open{transform:none}

.drawer-header{
  background:var(--card);border-bottom:1px solid var(--border2);
  padding:16px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;
}
.drawer-avatar{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,#2d5a1b,#5a9e6a);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.1rem;font-weight:800;
}
.drawer-name{font-size:1rem;font-weight:700;color:#1a2e1f}
.drawer-email{font-size:.78rem;color:var(--gray);margin-top:2px}
.drawer-close{
  margin-left:auto;width:32px;height:32px;border-radius:8px;
  background:none;border:1.5px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--gray);
  transition:all var(--tr);flex-shrink:0;
}
.drawer-close:hover{background:var(--rp);border-color:var(--red);color:var(--red)}

.drawer-body{flex:1;overflow-y:auto;padding:20px}

/* drawer tabs */
.d-tabs{display:flex;background:var(--lgray);border-radius:var(--radius-sm);padding:3px;gap:2px;margin-bottom:18px}
.d-tab{flex:1;padding:8px;border:none;background:none;font-family:var(--font);font-size:.82rem;font-weight:600;color:var(--gray);border-radius:var(--radius-xs);cursor:pointer;transition:all var(--tr)}
.d-tab.active{background:var(--card);color:var(--green);box-shadow:var(--shadow)}

/* drawer overview */
.d-overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.d-mini-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.d-mini-val{font-size:1.4rem;font-weight:800}
.d-mini-lbl{font-size:.72rem;color:var(--gray);margin-top:3px}

/* chapter progress */
.d-section-title{font-size:.75rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.d-section-title::before{content:'';width:3px;height:14px;background:var(--gl);border-radius:2px;display:inline-block}

.ch-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px}
.ch-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ch-block-name{font-size:.85rem;font-weight:700;color:#1a2e1f}
.ch-block-pct{font-size:1rem;font-weight:800}
.ch-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ch-bar-row:last-child{margin-bottom:0}
.ch-bar-name{font-size:.75rem;color:var(--gray);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-bar-track{width:100px;flex-shrink:0;background:var(--lgray);border-radius:3px;height:7px;overflow:hidden}
.ch-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.ch-bar-num{font-size:.72rem;font-weight:700;width:32px;text-align:right;flex-shrink:0}

/* history tab */
.h-item{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:14px;
}
.h-item:last-child{margin-bottom:0}
.h-num{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;
}
.h-info{flex:1;min-width:0}
.h-type{font-size:.85rem;font-weight:600;color:#1a2e1f}
.h-date{font-size:.72rem;color:var(--gray);margin-top:2px}
.h-score{text-align:right;flex-shrink:0}
.h-pct{font-size:1.05rem;font-weight:800}
.h-frac{font-size:.72rem;color:var(--gray);margin-top:1px}

/* ══════════════════ EMPTY / LOADING ══════════════════ */
.empty-wrap{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:56px 24px;text-align:center;
}
.empty-wrap .e-icon{font-size:2.5rem;margin-bottom:12px;opacity:.5}
.empty-wrap p{color:var(--gray);font-size:.88rem}
#loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px;gap:14px;color:var(--gray)}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--gl);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ══════════════════ RWD ══════════════════ */
@media(max-width:960px){.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .stats-row{grid-template-columns:1fr}
  .user-card{grid-template-columns:44px 1fr;gap:10px}
  .uc-ring-wrap,.uc-stat,.uc-pass{display:none}
  main{padding:14px 16px}
  header{padding:0 16px}
  #drawer{width:100vw}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-emblem"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C8 10 5.9 16.17 3.82 22"/><path d="M22 2s-5 2-8 7c-2.3 3.5-2 7-2 7s2-3.5 5-6c3.1-2.6 5-8 5-8z"/><path d="M2 16s3-1 6-3c3.5-2.3 4.5-5 4.5-5S10 13 8 15c-2.1 2.1-6 3-6 3z"/></svg></div>
    <h1>永續知幾 管理後台</h1>
    <p class="sub">請使用管理員帳號登入<br>以檢視全體學員的學習狀況</p>
    <button id="btn-google">
      <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      以 Google 帳號登入
    </button>
    <p id="login-error"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#b71c1c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 此帳號無管理員權限</p>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <header>
    <div class="h-left">
      <span class="h-badge">ADMIN</span>
      <h1>永續知幾 <span>/ 管理後台</span></h1>
    </div>
    <div class="h-right">
      <span id="admin-email"></span>
      <button id="btn-refresh" class="h-btn">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
        重新整理
      </button>
      <button id="btn-logout" class="h-btn">登出</button>
    </div>
  </header>

  <!-- 主分頁 tab -->
  <div class="main-tabs">
    <button class="main-tab active" data-pane="pane-dashboard"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> 總覽</button>
    <button class="main-tab" data-pane="pane-users"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> 學員管理</button>
    <button class="main-tab" data-pane="pane-visitors"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> 訪客管理</button>
    <button class="main-tab" data-pane="pane-analytics"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg> 操作紀錄</button>
  </div>

  <!-- 分頁零：總覽儀表板 -->
  <div id="pane-dashboard" class="tab-pane active">
    <main>
      <div id="dash-loading" class="an-loading"><div class="spinner"></div><span>載入總覽資料中…</span></div>
      <div id="dash-content" style="display:none;"></div>
    </main>
  </div>

  <!-- 分頁一：學員管理（原有內容） -->
  <div id="pane-users" class="tab-pane">
  <main>
    <!-- STATS -->
    <div class="stats-row">
      <div class="sc c0"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div><div class="sc-body"><div class="sc-val" id="s-users">—</div><div class="sc-lbl">總學員人數</div></div></div>
      <div class="sc c1"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div><div class="sc-body"><div class="sc-val" id="s-exams">—</div><div class="sc-lbl">累計考試次數</div></div></div>
      <div class="sc c2"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></div><div class="sc-body"><div class="sc-val" id="s-avg">—</div><div class="sc-lbl">全體平均答對率</div></div></div>
      <div class="sc c3"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg></div><div class="sc-body"><div class="sc-val" id="s-pass">—</div><div class="sc-lbl">整體通過率</div></div></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="sec-title">學員列表</span>
        <span class="count-pill" id="count-pill">0 人</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="search-wrap">
          <svg viewBox="0 0 16 16" fill="currentColor" style="color:var(--gray)"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg>
          <input type="text" id="search-input" placeholder="搜尋學員姓名或 Email…">
        </div>
        <button class="btn-export" id="btn-csv" title="匯出 CSV">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          匯出 CSV
        </button>
      </div>
    </div>

    <!-- USERS -->
    <div id="loading-wrap"><div class="spinner"></div><span>讀取學員資料中…</span></div>
    <div class="users-grid" id="users-grid" style="display:none"></div>
    <div id="empty-state" style="display:none" class="empty-wrap">
      <div class="e-icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><p>找不到符合條件的學員</p>
    </div>
  </main>
  </div><!-- /#pane-users -->

  <!-- 分頁二：訪客管理 -->
  <div id="pane-visitors" class="tab-pane">
    <main>
      <div class="stats-row">
        <div class="sc c0"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="sc-body"><div class="sc-val" id="vs-total">—</div><div class="sc-lbl">不重複訪客數</div></div></div>
        <div class="sc c1"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="sc-body"><div class="sc-val" id="vs-events">—</div><div class="sc-lbl">匿名事件總數</div></div></div>
        <div class="sc c2"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><div class="sc-body"><div class="sc-val" id="vs-avg-pv">—</div><div class="sc-lbl">平均瀏覽頁數</div></div></div>
        <div class="sc c3"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="sc-body"><div class="sc-val" id="vs-last">—</div><div class="sc-lbl">最後訪問時間</div></div></div>
      </div>
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="sec-title">訪客列表</span>
          <span class="count-pill" id="vs-count-pill">0 人</span>
        </div>
      </div>
      <div id="vs-loading"><div class="spinner" style="margin:40px auto;display:block;"></div></div>
      <div id="vs-grid" style="display:none;"></div>
      <div id="vs-empty" style="display:none;" class="empty-wrap">
        <div class="e-icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><p>尚無訪客資料</p>
      </div>
    </main>
  </div>
  <div id="pane-analytics" class="tab-pane">
    <div id="analytics-wrap">
      <div class="an-loading" id="an-loading"><div class="spinner"></div><span>載入操作紀錄中…</span></div>
      <div id="an-content" style="display:none;">
        <!-- 時間篩選 -->
        <div class="date-filter-bar">
          <span class="df-label">時間範圍：</span>
          <button class="df-btn active" data-range="all">全部</button>
          <button class="df-btn" data-range="today">今天</button>
          <button class="df-btn" data-range="7d">近 7 天</button>
          <button class="df-btn" data-range="30d">近 30 天</button>
          <button class="df-btn" data-range="custom">自訂</button>
          <div class="df-custom" id="df-custom-wrap" style="display:none;">
            <input type="date" id="df-start"> <span style="color:var(--gray);font-size:.75rem;">至</span> <input type="date" id="df-end">
            <button class="df-btn" id="df-apply" style="padding:4px 10px;">套用</button>
          </div>
        </div>
        <!-- 統計卡 -->
        <div class="an-stats-row">
          <div class="sc c0"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="sc-body"><div class="sc-val" id="an-s-total">—</div><div class="sc-lbl">總事件筆數</div></div></div>
          <div class="sc c1"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div><div class="sc-body"><div class="sc-val" id="an-s-pv">—</div><div class="sc-lbl">頁面瀏覽次數</div></div></div>
          <div class="sc c2"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M5 4h-1a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2h-1"/><polyline points="9 12 11 14 15 10"/></svg></div><div class="sc-body"><div class="sc-val" id="an-s-exam">—</div><div class="sc-lbl">考試次數（含匿名）</div></div></div>
          <div class="sc c3"><div class="sc-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div><div class="sc-body"><div class="sc-val" id="an-s-login">—</div><div class="sc-lbl">登入次數</div></div></div>
        </div>

        <!-- 頁面熱度 -->
        <div class="an-card">
          <div class="an-section-title">頁面瀏覽熱度</div>
          <div class="pg-heat-grid" id="pg-heat-grid"></div>
        </div>

        <!-- 事件時間軸 -->
        <div class="an-card">
          <div class="an-section-title">操作事件紀錄</div>
          <div class="an-filter-row">
            <span style="font-size:.78rem;color:var(--gray);margin-right:4px;">篩選：</span>
            <button class="an-chip active" data-filter="all">全部</button>
            <button class="an-chip" data-filter="page_view">頁面瀏覽</button>
            <button class="an-chip" data-filter="exam_start">考試開始</button>
            <button class="an-chip" data-filter="exam_submit">考試結束</button>
            <button class="an-chip" data-filter="login">登入</button>
            <button class="an-chip" data-filter="logout">登出</button>
            <button class="an-chip" data-filter="feature_click">功能點擊</button>
          </div>
          <div class="ev-list" id="ev-list"></div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /#dashboard -->

<!-- ── DRAWER（學員） ── -->
<div id="drawer-overlay"></div>
<div id="drawer">
  <div class="drawer-header">
    <div class="drawer-avatar" id="d-avatar">?</div>
    <div>
      <div class="drawer-name" id="d-name">—</div>
      <div class="drawer-email" id="d-email">—</div>
    </div>
    <button class="drawer-close" id="drawer-close"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="drawer-body">
    <div class="d-tabs">
      <button class="d-tab active" data-tab="overview">總覽</button>
      <button class="d-tab" data-tab="chapters">章節分析</button>
      <button class="d-tab" data-tab="history">考試紀錄</button>
    </div>
    <div id="d-content"></div>
  </div>
</div>

<!-- ── DRAWER（訪客） ── -->
<div id="vd-overlay"></div>
<div id="vd-drawer">
  <div class="drawer-header">
    <div class="drawer-avatar" id="vd-avatar" style="background:linear-gradient(135deg,#4a7ab5,#7aa8d4);"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    <div style="flex:1;min-width:0;">
      <div class="drawer-name" id="vd-name">—</div>
      <div class="drawer-email" id="vd-sub">—</div>
    </div>

</div>

// ── 時間篩選狀態 ──────────────────────────────
let dateRange = 'all';
let dateStart = null;
let dateEnd   = null;

function getFilteredEvents() {
  if (dateRange === 'all') return allEvents;
  const now = Date.now();
  let startTs, endTs = now;
  if (dateRange === 'today') {
    const d = new Date(); d.setHours(0,0,0,0);
    startTs = d.getTime();
  } else if (dateRange === '7d') {
    startTs = now - 7 * 86400000;
  } else if (dateRange === '30d') {
    startTs = now - 30 * 86400000;
  } else if (dateRange === 'custom' && dateStart && dateEnd) {
    startTs = new Date(dateStart).getTime();
    const ed = new Date(dateEnd); ed.setHours(23,59,59,999);
    endTs = ed.getTime();
  } else {
    return allEvents;
  }
  return allEvents.filter(e => e.ts >= startTs && e.ts <= endTs);
}

// 時間篩選按鈕事件
document.querySelectorAll('.df-btn[data-range]').forEach(btn => {

    btn.classList.add('active');

    document.getElementById('df-custom-wrap').style.display = dateRange === 'custom' ? 'flex' : 'none';
    if (dateRange !== 'custom') renderAnalytics();

document.getElementById('df-apply').addEventListener('click', () => {

});

// ── Analytics 資料載入 ──────────────────────────────
let allEvents = [];
let evFilter  = 'all';

async function loadAnalytics() {
  document.getElementById('an-loading').style.display = 'flex';
  document.getElementById('an-content').style.display = 'none';
  try {
    const snap = await get(query(ref(db, 'analytics/events'), orderByChild('ts'), limitToLast(500)));
    const raw  = snap.val();
    allEvents  = raw ? Object.values(raw).sort((a, b) => b.ts - a.ts) : [];
    renderAnalytics();
    document.getElementById('an-loading').style.display = 'none';
    document.getElementById('an-content').style.display = 'block';
  } catch(err) {
    document.getElementById('an-loading').innerHTML =
      `<span style="color:var(--red);font-size:.85rem">載入失敗：${err.message}</span>`;
  }
}

function renderAnalytics() {
  const filtered    = getFilteredEvents();
  const pvEvents    = filtered.filter(e => e.event === 'page_view');
  const examEvents  = filtered.filter(e => e.event === 'exam_submit');
  const loginEvents = filtered.filter(e => e.event === 'login');

  document.getElementById('an-s-total').textContent = filtered.length;
  document.getElementById('an-s-pv').textContent    = pvEvents.length;
  document.getElementById('an-s-exam').textContent  = examEvents.length;
  document.getElementById('an-s-login').textContent = loginEvents.length;

  // 頁面熱度
  const PAGE_LABELS = {
    home:'首頁', reader:'精華筆記', textbook2:'永續課文',
    notes:'考點卡片', charts:'圖表總覽', podcast:'Podcast 聆聽',
    textbook:'永續題庫', quiz:'歷屆題庫', exam:'模擬考試', progress:'學習進度',
    pastexam:'歷屆題庫', textbookq:'永續題庫', bookmarks:'收藏題目',
    search:'題目搜尋', keypoints:'考點卡片'
  };
  // 合併相同中文名稱的頁面計數
  const rawCounts = {};
  pvEvents.forEach(e => {
    const p = e.page || 'unknown';
    rawCounts[p] = (rawCounts[p] || 0) + 1;
  });
  const mergedCounts = {};
  Object.entries(rawCounts).forEach(([key, cnt]) => {
    const label = PAGE_LABELS[key] || key;
    mergedCounts[label] = (mergedCounts[label] || 0) + cnt;
  });
  const sorted = Object.entries(mergedCounts).sort((a,b) => b[1]-a[1]);
  const maxPv = Math.max(1, sorted[0]?.[1] || 1);
  const barColor = (i, n) => {
    const t = n > 1 ? i / (n - 1) : 0;
    const r = Math.round(74 + t * (168 - 74));
    const g = Math.round(154 + t * (196 - 154));
    const b2 = Math.round(90 + t * (138 - 90));
    return `rgb(${r},${g},${b2})`;
  };
  document.getElementById('pg-heat-grid').innerHTML = sorted.map(([label, cnt], i) => {
    const pct = (cnt / maxPv * 100).toFixed(0);
    const isSmall = pct < 20;
    return `<div class="pg-heat-item">
      <div class="pg-heat-rank">${i + 1}</div>
      <div class="pg-heat-name">${label}</div>
      <div class="pg-heat-bar" style="position:relative;">
        <div class="pg-heat-fill" style="width:${pct}%;background:${barColor(i, sorted.length)};"></div>
        ${!isSmall ? `<div class="pg-heat-count">${cnt}</div>` : ''}
      </div>
      ${isSmall ? `<div class="pg-heat-count outside">${cnt}</div>` : ''}
    </div>`;
  }).join('') || '<div style="color:var(--gray);font-size:.85rem;padding:16px;">尚無頁面瀏覽資料</div>';

  renderEventList();

  // 篩選chip事件
  document.querySelectorAll('.an-chip').forEach(chip => {
    chip.onclick = () => {
      document.querySelectorAll('.an-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      evFilter = chip.dataset.filter;
      renderEventList();
    };
  });
}

function renderEventList() {
  const EV_LABELS = {
    page_view: '頁面瀏覽', exam_start: '考試開始', exam_submit: '考試結束',
    login: '登入', logout: '登出', feature_click: '功能點擊'
  };
  const timeFiltered = getFilteredEvents();
  const filtered = evFilter === 'all' ? timeFiltered : timeFiltered.filter(e => e.event === evFilter);
  const $list = document.getElementById('ev-list');
  if (!filtered.length) {
    $list.innerHTML = '<div style="color:var(--gray);font-size:.85rem;padding:20px;text-align:center;">沒有符合的紀錄</div>';
    return;
  }
  $list.innerHTML = filtered.slice(0, 200).map(e => {
    const dt   = e.date || new Date(e.ts).toLocaleString('zh-TW');
    const isAnon   = !e.uid || e.uid === 'anonymous' || e.uid.startsWith('anon_');
    const shortId  = isAnon
      ? '訪客 · ' + (e.uid || '').replace('anon_','').slice(0,6)
      : (e.uid || '').slice(0, 8) + '…';
    const label = EV_LABELS[e.event] || e.event;
    let detail = '';
    if(e.event === 'page_view')    detail = e.page_name || e.page || '';
    if(e.event === 'exam_submit')  detail = `${e.correct}/${e.total} 題 (${e.pct}%) ${e.passed ? '✓通過' : '✗未通過'}`;
    if(e.event === 'exam_start')   detail = `${e.question_count} 題`;
    if(e.event === 'login')        detail = e.email || '';
    if(e.event === 'feature_click') detail = `從 ${e.from_page || '?'} 頁跳轉`;
    return `<div class="ev-item">
      <div class="ev-time">${dt}</div>
      <div><span class="ev-badge ev-${e.event}">${label}</span></div>
      <div class="ev-detail">${detail}</div>
      <div class="ev-uid" title="${e.uid || ''}">${shortId}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════
//  訪客管理
// ════════════════════════════════════════
let allVisitors = [];
let activeVid   = null;

const PAGE_LABELS_V = {
  home:'首頁', reader:'精華筆記', textbook2:'永續課文',
  notes:'考點卡片', charts:'圖表總覽', podcast:'Podcast 聆聽',
  textbook:'永續題庫', quiz:'歷屆題庫', exam:'模擬考試', progress:'學習進度',
  pastexam:'歷屆題庫', textbookq:'永續題庫', bookmarks:'收藏題目',
  search:'題目搜尋', keypoints:'考點卡片'
};
const EV_LABELS_V = {
  page_view:'頁面瀏覽', exam_start:'考試開始', exam_submit:'考試結束',
  login:'登入', logout:'登出', feature_click:'功能點擊'
};

async function loadVisitors() {
  document.getElementById('vs-loading').style.display = 'block';
  document.getElementById('vs-grid').style.display    = 'none';
  document.getElementById('vs-empty').style.display   = 'none';

  // 重用 allEvents，若還沒載入就先載入
  if(!allEvents.length) {
    try {
      const snap = await get(query(ref(db, 'analytics/events'), orderByChild('ts'), limitToLast(1000)));
      const raw  = snap.val();
      allEvents  = raw ? Object.values(raw).sort((a,b) => b.ts - a.ts) : [];
    } catch(err) {
      document.getElementById('vs-loading').innerHTML =
        `<span style="color:var(--red);font-size:.85rem">載入失敗：${err.message}</span>`;
      return;
    }
  }

  // 只取匿名訪客（uid 以 anon_ 開頭，或 anonymous）
  const anonEvents = allEvents.filter(e => e.uid && (e.uid.startsWith('anon_') || e.uid === 'anonymous'));

  // 聚合成訪客物件
  const visitorMap = {};
  anonEvents.forEach(e => {
    const vid = e.uid;
    if(!visitorMap[vid]) visitorMap[vid] = { vid, events: [], pages: new Set(), lastTs: 0 };
    visitorMap[vid].events.push(e);
    if(e.event === 'page_view' && e.page) visitorMap[vid].pages.add(e.page);
    if(e.ts > visitorMap[vid].lastTs) visitorMap[vid].lastTs = e.ts;
  });

  allVisitors = Object.values(visitorMap).sort((a,b) => b.lastTs - a.lastTs);

  // 統計卡
  const totalPv   = anonEvents.filter(e => e.event === 'page_view').length;
  const avgPv     = allVisitors.length ? (totalPv / allVisitors.length).toFixed(1) : '0';
  const lastTime  = allVisitors.length
    ? new Date(allVisitors[0].lastTs).toLocaleString('zh-TW', {timeZone:'Asia/Taipei', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})
    : '—';
  document.getElementById('vs-total').textContent   = allVisitors.length;
  document.getElementById('vs-events').textContent  = anonEvents.length;
  document.getElementById('vs-avg-pv').textContent  = avgPv;
  document.getElementById('vs-last').textContent    = lastTime;
  document.getElementById('vs-count-pill').textContent = `${allVisitors.length} 人`;

  document.getElementById('vs-loading').style.display = 'none';

  if(!allVisitors.length) {
    document.getElementById('vs-empty').style.display = 'block';
    return;
  }

  renderVisitorGrid();
}

function renderVisitorGrid() {
  const $grid = document.getElementById('vs-grid');
  $grid.style.display = 'flex';
  $grid.style.flexDirection = 'column';
  $grid.innerHTML = '';

  allVisitors.forEach(v => {
    const shortId  = v.vid.startsWith('anon_') ? v.vid.replace('anon_','').slice(0,8) : v.vid.slice(0,8);
    const lastDate = new Date(v.lastTs).toLocaleString('zh-TW', {timeZone:'Asia/Taipei', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
    const pages    = [...v.pages].slice(0,5);
    const pvCount  = v.events.filter(e => e.event === 'page_view').length;

    const card = document.createElement('div');
    card.className = 'visitor-card' + (v.vid === activeVid ? ' active' : '');
    card.dataset.vid = v.vid;
    card.innerHTML = `
      <div class="vc-avatar">${shortId.slice(0,3)}</div>
      <div class="vc-info">
        <div class="vc-name">訪客 · ${shortId}</div>
        <div class="vc-pages">
          ${pages.map(p => `<span class="vc-page-pill">${PAGE_LABELS_V[p]||p}</span>`).join('')}
          ${v.pages.size > 5 ? `<span class="vc-page-pill" style="background:var(--lgray);color:var(--gray);">+${v.pages.size-5}</span>` : ''}
        </div>
      </div>
      <div class="vc-stat">
        <div class="vc-stat-val" style="color:var(--blue)">${v.events.length}</div>
        <div class="vc-stat-lbl">事件數</div>
      </div>
      <div class="vc-stat">
        <div class="vc-stat-val" style="color:var(--green)">${pvCount}</div>
        <div class="vc-stat-lbl">瀏覽頁數</div>
      </div>
      <div class="vc-last">${lastDate}</div>`;
    card.addEventListener('click', () => openVdDrawer(v.vid));
    $grid.appendChild(card);
  });
}

function openVdDrawer(vid) {
  activeVid = vid;
  const v = allVisitors.find(x => x.vid === vid);
  if(!v) return;

  const shortId = v.vid.startsWith('anon_') ? v.vid.replace('anon_','').slice(0,8) : v.vid.slice(0,8);
  document.getElementById('vd-name').textContent = `訪客 · ${shortId}`;
  document.getElementById('vd-sub').textContent  = `共 ${v.events.length} 筆事件 · ${v.pages.size} 個頁面`;

  // 統計卡
  const pvCount   = v.events.filter(e => e.event === 'page_view').length;
  const examCount = v.events.filter(e => e.event === 'exam_submit').length;
  const firstTime = new Date(Math.min(...v.events.map(e=>e.ts))).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  const lastTime  = new Date(v.lastTs).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('vd-stats').innerHTML = `
    <div class="d-mini-card"><div class="d-mini-val" style="color:var(--blue)">${pvCount}</div><div class="d-mini-lbl">頁面瀏覽</div></div>
    <div class="d-mini-card"><div class="d-mini-val" style="color:var(--orange)">${examCount}</div><div class="d-mini-lbl">考試次數</div></div>
    <div class="d-mini-card" style="grid-column:span 2"><div class="d-mini-val" style="font-size:.9rem;color:var(--gray)">${firstTime}</div><div class="d-mini-lbl">首次訪問</div></div>`;

  // 事件列表（時間正序）
  const sorted = [...v.events].sort((a,b) => a.ts - b.ts);
  document.getElementById('vd-events').innerHTML = sorted.map(e => {
    const dt     = new Date(e.ts).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const label  = EV_LABELS_V[e.event] || e.event;
    let detail   = '';
    if(e.event === 'page_view')    detail = PAGE_LABELS_V[e.page] || e.page || '';
    if(e.event === 'exam_submit')  detail = `${e.correct}/${e.total} 題 (${e.pct}%) ${e.passed?'✓通過':'✗未通過'}`;
    if(e.event === 'exam_start')   detail = `${e.question_count} 題`;
    if(e.event === 'feature_click') detail = `從 ${e.from_page||'?'} 跳轉`;
    return `<div class="vd-ev-item">
      <div class="vd-ev-time">${dt}</div>
      <span class="ev-badge ev-${e.event}" style="flex-shrink:0">${label}</span>
      <div class="vd-ev-detail">${detail}</div>
    </div>`;
  }).join('') || '<p style="color:var(--gray);font-size:.85rem">無事件資料</p>';

  document.getElementById('vd-drawer').classList.add('open');
  document.getElementById('vd-overlay').classList.add('show');
  document.querySelectorAll('.visitor-card').forEach(c => c.classList.toggle('active', c.dataset.vid === vid));
}

function closeVdDrawer() {
  document.getElementById('vd-drawer').classList.remove('open');
  document.getElementById('vd-overlay').classList.remove('show');
  activeVid = null;
  document.querySelectorAll('.visitor-card').forEach(c => c.classList.remove('active'));
}
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
$overlay.addEventListener('click', closeDrawer);

// 訪客 drawer 關閉
document.getElementById('vd-close').addEventListener('click', closeVdDrawer);
document.getElementById('vd-overlay').addEventListener('click', closeVdDrawer);

// drawer tabs
document.querySelectorAll('.d-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.d-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    renderDrawerContent();
  });
});

// ── load ──
async function loadData() {
  $load.style.display  = 'flex';
  $grid.style.display  = 'none';
  $empty.style.display = 'none';
  try {
    const snap = await get(ref(db, 'users'));
    const raw  = snap.val();
    if (!raw) { $load.innerHTML = '<div style="color:var(--gray);font-size:.88rem">尚無學員資料</div>'; return; }

    allUsers = Object.entries(raw).map(([uid, data]) => {
      let p = {};
      try { p = typeof data.progress === 'string' ? JSON.parse(data.progress) : (data.progress || {}); } catch{}
      const history  = p.history  || [];
      const chStats  = p.chStats  || {};
      const secStats = p.secStats || {};
      const email       = data.profile?.email       || '';
      const displayName = data.profile?.displayName || '';
      const scores = history.map(h => h.pct || 0);
      return { uid, email, displayName, history, chStats, secStats,
        examCount : history.length,
        lastDate  : history.length ? history[history.length-1].date : '—',
        maxScore  : scores.length ? Math.max(...scores) : 0,
        avgScore  : scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0,
        passCount : history.filter(h=>(h.pct||0)>=70).length
      };
    });

    renderStats();
    $load.style.display = 'none';
    renderGrid('');
  } catch(err) {
    $load.innerHTML = `<span style="color:var(--red);font-size:.85rem">讀取失敗：${err.message}</span>`;
  }
}

// ── stats ──
function renderStats() {
  const all  = allUsers.flatMap(u => u.history.map(h => h.pct||0));
  const avg  = all.length ? all.reduce((a,b)=>a+b,0)/all.length : 0;
  const pass = all.length ? all.filter(s=>s>=70).length/all.length*100 : 0;
  document.getElementById('s-users').textContent = allUsers.length;
  document.getElementById('s-exams').textContent = allUsers.reduce((s,u)=>s+u.examCount,0);
  document.getElementById('s-avg').textContent   = avg.toFixed(1)+'%';
  document.getElementById('s-pass').textContent  = pass.toFixed(1)+'%';
}

// ── grid ──
function renderGrid(q) {
  const kw = q.toLowerCase();
  const list = kw ? allUsers.filter(u =>
    u.displayName.toLowerCase().includes(kw) ||
    u.email.toLowerCase().includes(kw) ||
    u.uid.toLowerCase().includes(kw)
  ) : allUsers;

  document.getElementById('count-pill').textContent = `${list.length} 人`;

  if (!list.length) {
    $grid.style.display  = 'none';
    $empty.style.display = 'block';
    return;
  }
  $empty.style.display = 'none';
  $grid.style.display  = 'flex';
  $grid.innerHTML = '';

  list.forEach(u => {
    const initials = (u.displayName || u.email || '?').slice(0,1).toUpperCase();
    const avgColor = u.avgScore>=70?'var(--green)':u.avgScore>=50?'var(--orange)':'var(--red)';
    const r = 20, circ = 2*Math.PI*r;
    const dash = (u.avgScore/100)*circ;
    const ringColor = u.avgScore>=70?'#93B574':u.avgScore>=50?'#c87848':'#e57373';

    const card = document.createElement('div');
    card.className = 'user-card' + (u.uid===activeUid?' active':'');
    card.dataset.uid = u.uid;
    card.innerHTML = `
      <div class="uc-avatar">${initials}</div>
      <div class="uc-info">
        <div class="uc-name">${u.displayName||'<span style="color:#b0a898;font-weight:400">未設定名稱</span>'}</div>
        <div class="uc-email">${u.email||'—'}</div>
      </div>
      <div class="uc-ring-wrap">
        <svg class="ring-svg" width="54" height="54" viewBox="0 0 54 54">
          <circle class="ring-bg" cx="27" cy="27" r="${r}"/>
          <circle class="ring-fill" cx="27" cy="27" r="${r}"
            stroke="${ringColor}"
            stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}"
            stroke-dashoffset="0"/>
          <text class="ring-text" x="27" y="27">${u.avgScore.toFixed(0)}%</text>
        </svg>
        <div class="uc-ring-label">平均答對率</div>
      </div>
      <div class="uc-stat">
        <div class="uc-stat-val" style="color:var(--blue)">${u.examCount}</div>
        <div class="uc-stat-lbl">考試次數</div>
      </div>
      <div class="uc-stat">
        <div class="uc-stat-val" style="color:${u.maxScore>=70?'var(--green)':'var(--orange)'}">${u.maxScore.toFixed(0)}%</div>
        <div class="uc-stat-lbl">最高分</div>
      </div>
      <div class="uc-pass">
        ${u.passCount>0
          ? `<span class="badge badge-green">✓ 通過 ${u.passCount} 次</span>`
          : u.examCount>0
            ? `<span class="badge badge-orange">尚未通過</span>`
            : `<span class="badge badge-gray">未考試</span>`}
      </div>`;
    card.addEventListener('click', () => openDrawer(u.uid));
    $grid.appendChild(card);
  });
}

// ── drawer ──
function openDrawer(uid) {
  activeUid = uid;
  const u = allUsers.find(x => x.uid === uid);
  if (!u) return;

  const initials = (u.displayName||u.email||'?').slice(0,1).toUpperCase();
  document.getElementById('d-avatar').textContent = initials;
  document.getElementById('d-name').textContent   = u.displayName || '未設定名稱';
  document.getElementById('d-email').textContent  = u.email || u.uid;

  document.querySelectorAll('.d-tab').forEach(b => b.classList.toggle('active', b.dataset.tab===activeTab));
  renderDrawerContent();

  $drawer.classList.add('open');
  $overlay.classList.add('show');
  document.querySelectorAll('.user-card').forEach(c => c.classList.toggle('active', c.dataset.uid===uid));
}

function closeDrawer() {
  $drawer.classList.remove('open');
  $overlay.classList.remove('show');
  activeUid = null;
  document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
}

function renderDrawerContent() {
  const u = allUsers.find(x => x.uid === activeUid);
  if (!u) return;
  const $c = document.getElementById('d-content');

  if (activeTab === 'overview') {
    const all = u.history.map(h=>h.pct||0);
    const avg = all.length ? all.reduce((a,b)=>a+b,0)/all.length : 0;
    const best= all.length ? Math.max(...all) : 0;
    $c.innerHTML = `
      <div class="d-overview-grid">
        <div class="d-mini-card"><div class="d-mini-val" style="color:var(--blue)">${u.examCount}</div><div class="d-mini-lbl">總考試次數</div></div>
        <div class="d-mini-card"><div class="d-mini-val" style="color:${u.passCount>0?'var(--green)':'var(--gray)'}">${u.passCount}</div><div class="d-mini-lbl">通過次數</div></div>
        <div class="d-mini-card"><div class="d-mini-val" style="color:${avg>=70?'var(--green)':avg>=50?'var(--orange)':'var(--red)'}">${avg.toFixed(1)}%</div><div class="d-mini-lbl">平均答對率</div></div>
        <div class="d-mini-card"><div class="d-mini-val" style="color:${best>=70?'var(--green)':best>=50?'var(--orange)':'var(--red)'}">${best.toFixed(1)}%</div><div class="d-mini-lbl">最高分</div></div>
      </div>
      <div class="d-section-title">最近考試紀錄</div>
      ${[...u.history].slice(-3).reverse().map(h=>historyItem(h)).join('')||'<p style="color:var(--gray);font-size:.85rem">尚無紀錄</p>'}
    `;
  } else if (activeTab === 'chapters') {
    // Group secStats by chapter
    const byChapter = {};
    for (const [ch] of Object.entries(u.chStats)) byChapter[ch] = [];
    for (const [name, s] of Object.entries(u.secStats)) {
      const ch = s.ch || 'other';
      if (!byChapter[ch]) byChapter[ch] = [];
      byChapter[ch].push({name, ...s});
    }

    let html = '<div class="d-section-title">各章節答題表現</div>';
    for (const [ch, stat] of Object.entries(u.chStats)) {
      const chPct = stat.total ? (stat.correct/stat.total*100) : 0;
      const color = CH_COLORS[ch]||'#7a6e65';
      const secs  = byChapter[ch]||[];
      html += `<div class="ch-block">
        <div class="ch-block-header">
          <div class="ch-block-name">${CH_LABELS[ch]||ch}</div>
          <div class="ch-block-pct" style="color:${color}">${chPct.toFixed(0)}%</div>
        </div>`;
      secs.forEach((s,i) => {
        const pct = s.total ? (s.correct/s.total*100):0;
        const c   = SEC_COLORS[i%SEC_COLORS.length];
        html += `<div class="ch-bar-row">
          <div class="ch-bar-name" title="${s.name}">${s.name}</div>
          <div class="ch-bar-track"><div class="ch-bar-fill" style="width:${pct.toFixed(1)}%;background:${c}"></div></div>
          <div class="ch-bar-num" style="color:${c}">${pct.toFixed(0)}%</div>
        </div>`;
      });
      html += '</div>';
    }
    $c.innerHTML = html || '<p style="color:var(--gray);font-size:.85rem">尚無章節資料</p>';
  } else {
    const items = [...u.history].reverse();
    $c.innerHTML = `<div class="d-section-title">全部考試紀錄（${items.length} 筆）</div>
      ${items.map(h=>historyItem(h)).join('')||'<p style="color:var(--gray);font-size:.85rem">尚無紀錄</p>'}`;
  }
}

// ── Dashboard 總覽 ──────────────────────────────
let dashLoaded = false;
async function loadDashboard() {
  const $loading = document.getElementById('dash-loading');
  const $content = document.getElementById('dash-content');
  $loading.style.display = 'flex';
  $content.style.display = 'none';

  // Ensure both data sources loaded
  try {
    if (!allUsers.length) {
      const snap = await get(ref(db, 'users'));
      const raw = snap.val();
      if (raw) {
        allUsers = Object.entries(raw).map(([uid, data]) => {
          let p = {};
          try { p = typeof data.progress === 'string' ? JSON.parse(data.progress) : (data.progress || {}); } catch{}
          const history  = p.history  || [];
          const chStats  = p.chStats  || {};
          const secStats = p.secStats || {};
          const email       = data.profile?.email       || '';
          const displayName = data.profile?.displayName || '';
          const scores = history.map(h => h.pct || 0);
          return { uid, email, displayName, history, chStats, secStats,
            examCount : history.length,
            lastDate  : history.length ? history[history.length-1].date : '—',
            maxScore  : scores.length ? Math.max(...scores) : 0,
            avgScore  : scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0,
            passCount : history.filter(h=>(h.pct||0)>=70).length
          };
        });
      }
    }
    if (!allEvents.length) {
      const snap = await get(query(ref(db, 'analytics/events'), orderByChild('ts'), limitToLast(500)));
      const raw = snap.val();
      allEvents = raw ? Object.values(raw).sort((a, b) => b.ts - a.ts) : [];
    }
  } catch(err) {
    $loading.innerHTML = `<span style="color:var(--red);font-size:.85rem">載入失敗：${err.message}</span>`;
    return;
  }

  renderDashboard();
  $loading.style.display = 'none';
  $content.style.display = 'block';
  dashLoaded = true;
}

      </div>

        <div class="dash-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> 頁面瀏覽</div>
        <div class="dash-val" style="color:var(--blue);">${todayPv}</div>
        <div class="dash-sub">今日瀏覽次數</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 考試次數</div>
        <div class="dash-val" style="color:var(--orange);">${todayExams}</div>
        <div class="dash-sub">今日考試提交</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 登入次數</div>
        <div class="dash-val" style="color:var(--purple);">${todayLogins}</div>
        <div class="dash-sub">今日登入事件</div>
      </div>
    </div>

    <!-- 整體概況 -->
    <div class="dash-section-title">整體概況</div>
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> 總學員</div>
        <div class="dash-val" style="color:var(--green);">${allUsers.length}</div>
        <div class="dash-sub">註冊學員人數</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 累計考試</div>

        <div class="dash-sub">近 7 天 ${weekExams} 次</div>

    <div class="dash-section-title">最近動態</div>
    <div class="dash-recent">
      ${recentEvents.map(e => {
        const dt = new Date(e.ts).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});

// ── CSV 匯出 ──────────────────────────────
document.getElementById('btn-csv').addEventListener('click', () => {
  if (!allUsers.length) { alert('尚無學員資料可匯出'); return; }

  const BOM = '\uFEFF';
  const headers = ['姓名','Email','考試次數','平均答對率(%)','最高分(%)','通過次數','最後考試日期'];
  const rows = allUsers.map(u => [
    u.displayName || '未設定',
    u.email || '',
    u.examCount,
    u.avgScore.toFixed(1),
    u.maxScore.toFixed(1),
    u.passCount,
    u.lastDate || '—'
  ]);

  const csv = BOM + [headers, ...rows].map(r =>
    r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')
  ).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `永續知幾_學員資料_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// ── 搜尋輸入事件 ──────────────────────────────
document.getElementById('search-input').addEventListener('input', (e) => {
  renderGrid(e.target.value);
});

function historyItem(h) {
  const pct   = (h.pct||0).toFixed(1);
  const color = h.passed?'var(--green)':(h.pct||0)>=50?'var(--orange)':'var(--red)';
  const bgCol = h.passed?'var(--gp)':(h.pct||0)>=50?'var(--op)':'var(--rp)';
  return `<div class="h-item">
    <div class="h-num" style="background:${bgCol};color:${color}">${pct}%</div>
    <div class="h-info">
      <div class="h-type">${h.type||'模擬考試'}</div>
      <div class="h-date">${h.date}</div>
    </div>
    <div class="h-score">
      <div class="h-pct" style="color:${color}">${pct}%</div>
      <div class="h-frac">${h.correct} / ${h.total} 題</div>
    </div>
    ${h.passed?`<span class="badge badge-green" style="font-size:.68rem">通過</span>`:`<span class="badge badge-gray" style="font-size:.68rem">未通過</span>`}
  </div>`;
}
