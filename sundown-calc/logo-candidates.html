<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>外框風格對比 · 傷當有計</title>
<style>
  body{
    font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;
    background:#F5F0E8;color:#1A2535;
    margin:0;padding:48px 32px;
  }
  h1{font-size:22px;font-weight:800;letter-spacing:.05em;margin:0 0 6px;color:#1E3554}
  .sub{font-size:13px;color:#8A96A8;margin:0 0 40px}
  .grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:28px;
    max-width:1100px;
  }
  .card{
    background:#fff;border:1px solid #E8E2D8;border-radius:14px;
    padding:26px 20px;text-align:center;
    box-shadow:0 2px 8px rgba(30,53,84,.04);
    transition:transform .2s;
  }
  .card:hover{transform:translateY(-3px)}
  .logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;height:110px}
  .logo-row svg.big{width:96px;height:96px}
  .logo-row svg.small{width:32px;height:32px}
  .label{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#C0622A;margin-bottom:6px}
  .name{font-size:15px;font-weight:700;color:#1E3554;margin-bottom:4px}
  .desc{font-size:12px;color:#8A96A8;line-height:1.5}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>小靈靈外框風格 · 6 選 1</h1>
<p class="sub">內容不變，試 6 種框形</p>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- 共用內容（無外框版） -->
    <g id="content">
      <!-- 背景 -->
      <circle cx="32" cy="32" r="30" fill="#1E3554"/>
      <path d="M4 38 A28 28 0 0 1 60 38" fill="none" stroke="#C0622A" stroke-width="5"/>
      <path d="M7 38 A25 25 0 0 1 57 38" fill="none" stroke="#E8B84B" stroke-width="5"/>
      <path d="M10 38 A22 22 0 0 1 54 38" fill="none" stroke="#F2CC74" stroke-width="5"/>
      <path d="M13 38 A19 19 0 0 1 51 38" fill="none" stroke="#7A9A5A" stroke-width="5"/>
      <!-- 星星 -->
      <g fill="#F5D06B">
        <path d="M12 14 L13 17 L16 17 L13.5 19 L14.5 22 L12 20 L9.5 22 L10.5 19 L8 17 L11 17 Z"/>
        <circle cx="52" cy="14" r="1.3"/>
        <circle cx="18" cy="24" r="1"/>
        <circle cx="48" cy="24" r="1"/>
        <circle cx="13" cy="32" r="0.8"/>
        <circle cx="51" cy="32" r="0.8"/>
      </g>
      <!-- 幽靈 -->
      <path d="M20 34 Q20 18 32 18 Q44 18 44 34 L44 54 L40 50 L36 54 L32 50 L28 54 L24 50 L20 54 Z" fill="#FDF4DC"/>
      <circle cx="28" cy="28" r="1.4" fill="#1E3554"/>
      <circle cx="36" cy="28" r="1.4" fill="#1E3554"/>
      <circle cx="28.4" cy="27.6" r="0.5" fill="#FDF4DC"/>
      <circle cx="36.4" cy="27.6" r="0.5" fill="#FDF4DC"/>
      <circle cx="25" cy="31" r="1.6" fill="#FF9BB0" opacity=".75"/>
      <circle cx="39" cy="31" r="1.6" fill="#FF9BB0" opacity=".75"/>
      <path d="M30 31 Q32 33 34 31" stroke="#1E3554" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- 愛心 -->
      <g transform="translate(24.8 34.8) scale(0.6)">
        <path d="M12 21 C12 21 2 13 2 7 C2 4 4 2 7 2 C9 2 11 3 12 5 C13 3 15 2 17 2 C20 2 22 4 22 7 C22 13 12 21 12 21 Z"
              fill="#FF6B8A" stroke="#C0323E" stroke-width="0.5"/>
      </g>
    </g>
    <clipPath id="circle-clip"><circle cx="32" cy="32" r="29"/></clipPath>
    <clipPath id="square-clip"><rect x="4" y="4" width="56" height="56" rx="12"/></clipPath>
    <clipPath id="hex-clip"><polygon points="32,3 56,17 56,47 32,61 8,47 8,17"/></clipPath>
    <clipPath id="shield-clip"><path d="M32 4 L56 12 L56 36 Q56 52 32 60 Q8 52 8 36 L8 12 Z"/></clipPath>
  </defs>
</svg>

<div class="grid">

  <!-- 01. 現在版 · 雙線圓框 -->
  <div class="card">
    <div class="logo-row">
      <svg class="big" viewBox="0 0 64 64">
        <g clip-path="url(#circle-clip)"><use href="#content"/></g>
        <circle cx="32" cy="32" r="29" fill="none" stroke="#E8B84B" stroke-width="2"/>
        <circle cx="32" cy="32" r="27" fill="none" stroke="#1E3554" stroke-width="0.6" opacity=".4"/>
      </svg>
      <svg class="small" viewBox="0 0 64 64">
        <g clip-path="url(#circle-clip)"><use href="#content"/></g>
        <circle cx="32" cy="32" r="29" fill="none" stroke="#E8B84B" stroke-width="2"/>
      </svg>
    </div>
    <div class="label">01 · 現況</div>
    <div class="name">雙線金圓框</div>
    <div class="desc">金圈 + 內細深線，優雅</div>
  </div>

  <!-- 02. 圓角方框 (App Icon 風) -->
  <div class="card">
    <div class="logo-row">
      <svg class="big" viewBox="0 0 64 64">
        <g clip-path="url(#square-clip)"><use href="#content"/></g>
        <rect x="4" y="4" width="56" height="56" rx="12" fill="none" stroke="#E8B84B" stroke-width="2.5"/>
      </svg>
      <svg class="small" viewBox="0 0 64 64">
        <g clip-path="url(#square-clip)"><use href="#content"/></g>
        <rect x="4" y="4" width="56" height="56" rx="12" fill="none" stroke="#E8B84B" stroke-width="2.5"/>
      </svg>
    </div>
    <div class="label">02</div>
    <div class="name">圓角方框 · App Icon</div>
    <div class="desc">iOS/Android 應用圖標風格，現代</div>
  </div>

  <!-- 03. 六角形 -->
  <div class="card">
    <div class="logo-row">
      <svg class="big" viewBox="0 0 64 64">
        <g clip-path="url(#hex-clip)"><use href="#content"/></g>
        <polygon points="32,3 56,17 56,47 32,61 8,47 8,17" fill="none" stroke="#E8B84B" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
      <svg class="small" viewBox="0 0 64 64">
        <g clip-path="url(#hex-clip)"><use href="#content"/></g>
        <polygon points="32,3 56,17 56,47 32,61 8,47 8,17" fill="none" stroke="#E8B84B" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="label">03</div>
    <div class="name">六角形徽章</div>
    <div class="desc">結構感強，有「認證」感</div>
  </div>

  <!-- 04. 盾牌形 -->
  <div class="card">
    <div class="logo-row">
      <svg class="big" viewBox="0 0 64 64">
        <g clip-path="url(#shield-clip)"><use href="#content"/></g>
        <path d="M32 4 L56 12 L56 36 Q56 52 32 60 Q8 52 8 36 L8 12 Z" fill="none" stroke="#E8B84B" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
      <svg class="small" viewBox="0 0 64 64">
        <g clip-path="url(#shield-clip)"><use href="#content"/></g>
        <path d="M32 4 L56 12 L56 36 Q56 52 32 60 Q8 52 8 36 L8 12 Z" fill="none" stroke="#E8B84B" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="label">04</div>
    <div class="name">盾牌框</div>
    <div class="desc">守護意象，呼應「保護權益」</div>
  </div>

  <!-- 05. 虛線圓框 -->
  <div class="card">
    <div class="logo-row">
      <svg class="big" viewBox="0 0 64 64">
        <g clip-path="url(#circle-clip)"><use href="#content"/></g>
        <circle cx="32" cy="32" r="29" fill="none" stroke="#E8B84B" stroke-width="1.8" stroke-dasharray="3 1.5"/>
      </svg>
      <svg class="small" viewBox="0 0 64 64">
        <g clip-path="url(#circle-clip)"><use href="#content"/></g>
        <circle cx="32" cy="32" r="29" fill="none" stroke="#E8B84B" stroke-width="1.8" stroke-dasharray="3 1.5"/>
      </svg>
    </div>
    <div class="label">05</div>
    <div class="name">虛線縫線框</div>
    <div class="desc">手縫感，OK繃/布偶質感，可愛</div>
  </div>

  <!-- 06. 厚實圓環 + 內光 -->
  <div class="card">
    <div class="logo-row">
      <svg class="big" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="31" fill="#E8B84B"/>
        <circle cx="32" cy="32" r="28" fill="#1E3554"/>
        <g clip-path="url(#inner28)">
          <use href="#content"/>
        </g>
        <defs>
          <clipPath id="inner28"><circle cx="32" cy="32" r="28"/></clipPath>
        </defs>
        <circle cx="32" cy="32" r="26" fill="none" stroke="#FDF4DC" stroke-width="0.6" opacity=".3"/>
      </svg>
      <svg class="small" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="31" fill="#E8B84B"/>
        <g clip-path="url(#inner28)">
          <use href="#content"/>
        </g>
      </svg>
    </div>
    <div class="label">06</div>
    <div class="name">厚實金環</div>
    <div class="desc">飽滿金色厚環 + 內發光，高級感</div>
  </div>

</div>

<p style="margin-top:40px;font-size:12px;color:#8A96A8">
  <strong>個人推薦：</strong>02 圓角方框（最現代，符合當代 app icon 潮流） 或 05 虛線縫線框（最可愛，呼應療癒主題）
</p>

</body>
</html>
